<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dành cho cậu ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Video tràn màn hình như TikTok */
        #loveVideo {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Hoặc 'cover' nếu muốn tràn viền hoàn toàn */
            display: none; /* Ẩn lúc đầu */
        }

        /* Màn hình chờ kích hoạt */
        #overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://source.unsplash.com/random/900x1600/?love');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            color: white;
            text-align: center;
        }

        .play-btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 20px;
            border: 2px solid white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        h2 { font-weight: 300; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="startVideo()">
        <div class="play-btn">▶</div>
        <h2>Bấm để mở quà nha...</h2>
    </div>

    <video id="loveVideo" playsinline loop>
        <source src="vid.mp4" type="video/mp4">
    </video>

    <script>
        function startVideo() {
            const video = document.getElementById('loveVideo');
            const overlay = document.getElementById('overlay');
            
            // Ẩn màn hình chờ, hiện video
            overlay.style.display = 'none';
            video.style.display = 'block';
            
            // Phát video có âm thanh
            video.muted = false;
            video.play();
        }
    </script>
</body>
</html>
